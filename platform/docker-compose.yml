services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: indexjet
      POSTGRES_PASSWORD: indexjet
      POSTGRES_DB: indexjet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexjet"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  migrate:
    build:
      context: .
      target: worker
    command: ["npx", "prisma", "migrate", "deploy"]
    environment: &appenv
      DATABASE_URL: postgresql://indexjet:indexjet@postgres:5432/indexjet
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      APP_URL: ${APP_URL:-http://localhost:3000}
      INDEXNOW_KEY: ${INDEXNOW_KEY:?set INDEXNOW_KEY in .env}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      target: web
    environment: *appenv
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    environment: *appenv
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
